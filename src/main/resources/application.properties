# ========================================
# Application Configuration
# ========================================
spring.application.name=parkminjeproject
server.port=8080

# ========================================
# Database Configuration (MariaDB ??)
# ========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/portfolio_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&sessionVariables=tx_isolation='READ-COMMITTED'}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ? Connection Pool ?? ??
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

# ========================================
# JPA / Hibernate Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# 404 ?? ?? ???
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=WARN

# ? ??? ???? ?? ??
spring.jpa.open-in-view=true

# ?? ?? ???
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ? ???? ?? ?? ??
spring.jpa.properties.hibernate.connection.isolation=2

# ========================================
# Thymeleaf Configuration
# ========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=true

# ========================================
# File Upload Configuration (?? ???)
# ========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

file.upload.dir=${FILE_UPLOAD_DIR:${user.home}/portfolio-uploads}
file.upload.max-size=5242880
file.upload.allowed-extensions=jpg,jpeg,png,gif,webp

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.project.parkminjeproject=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG

logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# Error Page Configuration
# ========================================
server.error.whitelabel.enabled=false
server.error.path=/error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ========================================
# Security Configuration (?? ??)
# ========================================
# ? ?? ???? ?? (20? -> 60?)
server.servlet.session.timeout=60m

server.servlet.session.cookie.name=PORTFOLIOSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=strict

# ? ?? ?? ?? ?? (JDBC ?? ?? ??? ?? ??)
spring.session.store-type=none

# Remember-Me ??
security.remember-me.key=local-dev-secret-key

# CSRF ??
spring.security.csrf.enabled=true

# ========================================
# Actuator Configuration (????)
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ========================================
# Development Settings
# ========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ========================================
# Cache Configuration (??? ?? ??)
# ========================================
spring.cache.type=simple
spring.cache.cache-names=portfolios,portfolio-detail,category-stats,dashboard-stats

# ========================================
# Internationalization
# ========================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

# ========================================
# Jackson Configuration (JSON)
# ========================================
spring.jackson.time-zone=Asia/Seoul
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null

# ========================================
# Banner Configuration
# ========================================
spring.banner.location=classpath:banner.txt
spring.main.banner-mode=console