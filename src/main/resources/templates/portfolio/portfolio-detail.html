<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF 토큰 (Thymeleaf로 직접 삽입) -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${portfolio.title} + ' - 프로젝트 상세'">프로젝트 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #8b5cf6;
            --text: #1e293b;
            --text-light: #64748b;
            --bg: #ffffff;
            --bg-alt: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        .project-hero {
            padding: 8rem 2rem 4rem;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
        }

        .hero-content {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        .project-category {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: var(--primary);
            color: white;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .project-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .project-summary {
            font-size: 1.25rem;
            color: var(--text-light);
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        .project-meta {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            font-size: 0.875rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .meta-value {
            font-weight: 600;
            font-size: 1.125rem;
        }

        .main-image {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .main-image img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .project-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .content-section {
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
            padding-left: 1.5rem;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        .section-text {
            font-size: 1.125rem;
            color: var(--text);
            line-height: 1.8;
            white-space: pre-line;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .tech-item {
            padding: 1rem;
            background: var(--bg-alt);
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tech-item:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .achievement-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .achievement-item {
            padding: 1.5rem;
            background: var(--bg-alt);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .achievement-title {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .achievement-desc {
            color: var(--text-light);
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .gallery-item {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .project-links {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .link-btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .link-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }

        .link-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .link-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .link-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .related-section {
            padding: 6rem 2rem;
            background: var(--bg-alt);
        }

        .related-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .related-card {
            background: var(--bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text);
        }

        .related-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .related-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .related-content {
            padding: 1.5rem;
        }

        .related-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .related-category {
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .project-title {
                font-size: 2rem;
            }

            .project-meta {
                gap: 1.5rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .tech-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
    <!-- CSRF 토큰 자동 처리 -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        // CSRF 토큰을 JavaScript 변수로 저장
        var csrfToken = /*[[${_csrf.token}]]*/ '';
        var csrfHeader = /*[[${_csrf.headerName}]]*/ '';

        console.log('✅ CSRF 토큰 로드됨:', csrfToken.substring(0, 20) + '...');

        // 모든 폼 제출 시 CSRF 토큰 자동 추가
        document.addEventListener('DOMContentLoaded', function() {
            document.addEventListener('submit', function(e) {
                const form = e.target;
                if (form.method.toUpperCase() === 'POST') {
                    let csrfInput = form.querySelector('input[name="_csrf"]');
                    if (!csrfInput) {
                        csrfInput = document.createElement('input');
                        csrfInput.type = 'hidden';
                        csrfInput.name = '_csrf';
                        form.appendChild(csrfInput);
                    }
                    csrfInput.value = csrfToken;
                    console.log('✅ 폼에 CSRF 토큰 추가됨');
                }
            });
        });

        // fetch 요청용
        if (window.fetch) {
            const originalFetch = window.fetch;
            window.fetch = function(url, options = {}) {
                if (options.method && options.method.toUpperCase() !== 'GET') {
                    options.headers = options.headers || {};
                    options.headers[csrfHeader] = csrfToken;
                }
                return originalFetch(url, options);
            };
        }
        /*]]>*/
    </script>
</head>

<body>

<nav>
    <div class="nav-container">
        <a href="/static" class="back-btn">
            <span>←</span>
            <span>돌아가기</span>
        </a>
    </div>
</nav>

<section class="project-hero">
    <div class="hero-content">
        <span class="project-category" th:text="${portfolio.category}">웹 개발</span>
        <h1 class="project-title" th:text="${portfolio.title}">프로젝트 제목</h1>
        <p class="project-summary" th:text="${portfolio.summary}">프로젝트 요약 설명</p>

        <div class="project-meta">
            <div class="meta-item" th:if="${portfolio.duration != null}">
                <div class="meta-label">기간</div>
                <div class="meta-value" th:text="${portfolio.duration}">3개월</div>
            </div>
            <div class="meta-item" th:if="${portfolio.role != null}">
                <div class="meta-label">역할</div>
                <div class="meta-value" th:text="${portfolio.role}">풀스택 개발</div>
            </div>
            <div class="meta-item" th:if="${portfolio.client != null}">
                <div class="meta-label">클라이언트</div>
                <div class="meta-value" th:text="${portfolio.client}">회사명</div>
            </div>
            <div class="meta-item" th:if="${portfolio.teamSize != null}">
                <div class="meta-label">팀 규모</div>
                <div class="meta-value" th:text="${portfolio.teamSize}">5명</div>
            </div>
        </div>
    </div>
</section>

<div class="main-image">
    <img th:src="${portfolio.imageUrl}" th:alt="${portfolio.title}">
</div>

<div class="project-content">

    <div class="content-section" th:if="${portfolio.description != null}">
        <h2 class="section-title">프로젝트 개요</h2>
        <p class="section-text" th:text="${portfolio.description}">프로젝트 상세 설명</p>
    </div>

    <div class="content-section" th:if="${portfolio.technologies != null}">
        <h2 class="section-title">사용 기술</h2>
        <div class="tech-grid">
            <div class="tech-item" th:each="tech : ${#strings.arraySplit(portfolio.technologies, ',')}">
                <span th:text="${tech}">React</span>
            </div>
        </div>
    </div>

    <div class="content-section" th:if="${portfolio.challenges != null}">
        <h2 class="section-title">도전과 해결</h2>
        <p class="section-text" th:text="${portfolio.challenges}">프로젝트에서 직면한 도전과 해결 과정</p>
    </div>

    <div class="content-section" th:if="${portfolio.achievements != null}">
        <h2 class="section-title">주요 성과</h2>
        <div class="achievement-list">
            <div class="achievement-item" th:each="achievement : ${#strings.arraySplit(portfolio.achievements, '|')}">
                <div class="achievement-desc" th:text="${achievement}">성과 설명</div>
            </div>
        </div>
    </div>

    <div class="content-section" th:if="${portfolio.impact != null}">
        <h2 class="section-title">프로젝트 임팩트</h2>
        <p class="section-text" th:text="${portfolio.impact}">프로젝트의 비즈니스 임팩트</p>
    </div>

    <!-- Project Links -->
    <div class="project-links">
        <a th:if="${portfolio.demoUrl != null}" th:href="${portfolio.demoUrl}" target="_blank" class="link-btn link-primary">
            <span>🚀</span>
            <span>라이브 데모</span>
        </a>
        <a th:if="${portfolio.githubUrl != null}" th:href="${portfolio.githubUrl}" target="_blank" class="link-btn link-secondary">
            <span>💻</span>
            <span>GitHub</span>
        </a>
        <a th:if="${portfolio.projectUrl != null}" th:href="${portfolio.projectUrl}" target="_blank" class="link-btn link-secondary">
            <span>🔗</span>
            <span>프로젝트 링크</span>
        </a>
    </div>

    <!-- ⭐⭐ 여기에 요청하신 좋아요 버튼 코드 삽입됨 ⭐⭐ -->

    <!-- 좋아요 버튼 섹션 -->
    <div class="content-section">
        <div style="display: flex; justify-content: center; gap: 2rem; align-items: center;">
            <button id="likeButton" class="like-button" onclick="toggleLike()">
                <span id="likeIcon">🤍</span>
                <span id="likeText">좋아요</span>
                <span id="likeCount" th:text="${portfolio.likeCount}">0</span>
            </button>
            <div style="color: var(--text-light);">
                <span>👁️</span>
                <span th:text="${portfolio.viewCount}">0</span> 조회
            </div>
        </div>
    </div>

</div> <!-- project-content 끝 -->

<section class="related-section" th:if="${relatedPortfolios != null && !relatedPortfolios.isEmpty()}">
    <div class="related-container">
        <h2 class="section-title" style="text-align: center; padding-left: 0;">
            <span style="padding-left: 1.5rem;">관련 프로젝트</span>
        </h2>
        <div class="related-grid">
            <a th:each="related : ${relatedPortfolios}"
               th:href="@{/portfolio/{id}(id=${related.id})}"
               class="related-card">
                <img th:src="${related.imageUrl}" class="related-image" th:alt="${related.title}">
                <div class="related-content">
                    <div class="related-category" th:text="${related.category}">카테고리</div>
                    <h3 class="related-title" th:text="${related.title}">프로젝트 제목</h3>
                </div>
            </a>
        </div>
    </div>
</section>

<script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    const galleryItems = document.querySelectorAll('.gallery-item');
    galleryItems.forEach(item => {
        item.addEventListener('click', () => {
            const img = item.querySelector('img');
            window.open(img.src, '_blank');
        });
    });
</script>

<style>
    .like-button {
        padding: 1rem 2rem;
        border: 2px solid var(--border);
        border-radius: 50px;
        background: white;
        font-size: 1.125rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .like-button:hover {
        border-color: #e74c3c;
        transform: scale(1.05);
    }

    .like-button.liked {
        background: #e74c3c;
        color: white;
        border-color: #e74c3c;
    }

    .like-button:active {
        transform: scale(0.95);
    }
</style>

<script th:inline="javascript">
    /*<![CDATA[*/
    const portfolioId = /*[[${portfolio.id}]]*/ 1;

    document.addEventListener('DOMContentLoaded', function() {
        checkLikeStatus();
    });

    function checkLikeStatus() {
        fetch(`/api/portfolio/${portfolioId}/like-status`)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateLikeButton(data.hasLiked, data.likeCount);
                }
            })
            .catch(error => console.error('좋아요 상태 조회 실패:', error));
    }

    function toggleLike() {
        const button = document.getElementById('likeButton');
        button.disabled = true;

        fetch(`/api/portfolio/${portfolioId}/like`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const hasLiked = data.action === 'liked';
                updateLikeButton(hasLiked, data.likeCount);
                showToast(data.message);
            } else {
                alert(data.message || '오류가 발생했습니다.');
            }
        })
        .catch(error => {
            console.error('좋아요 처리 실패:', error);
            alert('좋아요 처리 중 오류가 발생했습니다.');
        })
        .finally(() => {
            button.disabled = false;
        });
    }

    function updateLikeButton(hasLiked, likeCount) {
        const button = document.getElementById('likeButton');
        const icon = document.getElementById('likeIcon');
        const text = document.getElementById('likeText');
        const countSpan = document.getElementById('likeCount');

        if (hasLiked) {
            button.classList.add('liked');
            icon.textContent = '❤️';
            text.textContent = '좋아요 취소';
        } else {
            button.classList.remove('liked');
            icon.textContent = '🤍';
            text.textContent = '좋아요';
        }

        countSpan.textContent = likeCount;
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            z-index: 10000;
            animation: fadeInOut 2s ease;
        `;
        document.body.appendChild(toast);

        setTimeout(() => {
            document.body.removeChild(toast);
        }, 2000);
    }
    /*]]>*/
</script>

<style>
    @keyframes fadeInOut {
        0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        20% { opacity: 1; transform: translateX(-50%) translateY(0); }
        80% { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
</style>

</body>
</html>
