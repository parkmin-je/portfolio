<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Sidebar Fragment</title>
</head>
<body>
<!-- 관리자 사이드바 -->
<div th:fragment="admin-sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2>관리자 메뉴</h2>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/admin}"
           th:classappend="${#strings.equals(currentPage, 'dashboard') ? 'active' : ''}"
           class="nav-item">
            <span class="icon">📊</span>
            <span>대시보드</span>
        </a>

        <a th:href="@{/admin/portfolio}"
           th:classappend="${#strings.equals(currentPage, 'portfolio') ? 'active' : ''}"
           class="nav-item">
            <span class="icon">📁</span>
            <span>포트폴리오 관리</span>
        </a>

        <a th:href="@{/admin/users}"
           th:classappend="${#strings.equals(currentPage, 'users') ? 'active' : ''}"
           class="nav-item">
            <span class="icon">👥</span>
            <span>사용자 관리</span>
        </a>

        <a th:href="@{/admin/profile}"
           th:classappend="${#strings.equals(currentPage, 'profile') ? 'active' : ''}"
           class="nav-item">
            <span class="icon">⚙️</span>
            <span>프로필 설정</span>
        </a>

        <a th:href="@{/admin/audit-logs}"
           th:classappend="${#strings.equals(currentPage, 'logs') ? 'active' : ''}"
           class="nav-item">
            <span class="icon">📋</span>
            <span>활동 로그</span>
        </a>

        <div class="sidebar-divider"></div>

        <a th:href="@{/}" class="nav-item" target="_blank">
            <span class="icon">🏠</span>
            <span>메인 페이지</span>
        </a>

        <a th:href="@{/logout}" class="nav-item logout">
            <span class="icon">🚪</span>
            <span>로그아웃</span>
        </a>
    </nav>

    <style>
        .sidebar {
            width: 250px;
            background: #1e293b;
            color: white;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .sidebar-nav {
            padding: 1rem 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-left: 3px solid #3b82f6;
        }

        .nav-item .icon {
            font-size: 1.25rem;
        }

        .sidebar-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 1rem 1.5rem;
        }

        .nav-item.logout {
            color: #ef4444;
        }

        .nav-item.logout:hover {
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</div>
</body>
</html>
