<!-- 500.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <title>500 - 서버 오류</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #f39c12;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .error-details {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: left;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-code">500</div>
    <h1>서버 오류가 발생했습니다</h1>
    <p>
        죄송합니다. 서버에서 오류가 발생했습니다.<br>
        잠시 후 다시 시도해주세요.
    </p>

    <div class="error-details" th:if="${error}">
        <strong>오류 정보:</strong><br>
        <span th:text="${error}"></span>
    </div>

    <a href="/" class="btn" style="margin-top: 1rem;">🏠 홈으로 돌아가기</a>
</div>
</body>
</html>
